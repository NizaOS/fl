<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>3d vibe</title>
<style>
body{
margin:0;
overflow:hidden;
background:#050505;
font-family:arial;
}
#u{
position:absolute;
top:20px;
left:20px;
color:#fff;
z-index:5;
width:320px;
backdrop-filter:blur(8px);
background:rgba(255,255,255,.08);
padding:18px;
border-radius:18px;
border:1px solid rgba(255,255,255,.15);
}
#u h1{
margin:0 0 10px;
font-size:30px;
}
#u p{
line-height:1.5;
font-size:14px;
opacity:.9;
}
#b{
margin-top:12px;
display:flex;
gap:10px;
flex-wrap:wrap;
}
button{
background:#fff;
color:#000;
border:none;
padding:10px 14px;
border-radius:999px;
cursor:pointer;
font-size:12px;
text-transform:lowercase;
}
#i{
position:absolute;
bottom:20px;
right:20px;
color:#fff;
z-index:5;
background:rgba(255,255,255,.08);
padding:12px;
border-radius:14px;
font-size:13px;
backdrop-filter:blur(8px);
}
canvas{
display:block;
}
</style>
</head>
<body>
<div id="u">
<h1>futre lab</h1>
<p>welcomme to the digitel dome where ideas floot in neon skys and tiny robots dance arond glowing cubes.</p>
<p>drag the sceen, press butons and watch the coler shift while meteors spinn in the backgrond.</p>
<div id="b">
<button id="a">spin mod</button>
<button id="c">dark sky</button>
<button id="d">crazy zoom</button>
<button id="e">move shaps</button>
</div>
</div>
<div id="i">6+ fetures active • texturd moon • 3d shaps</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.min.js"></script>
<script>
let s=new THREE.Scene()
let c=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.1,1000)
let r=new THREE.WebGLRenderer({antialias:true})
r.setSize(innerWidth,innerHeight)
document.body.appendChild(r.domElement)

let l=new THREE.PointLight(0xffffff,2)
l.position.set(8,10,8)
s.add(l)

let h=new THREE.AmbientLight(0x666666)
s.add(h)

let t=new THREE.TextureLoader().load('https://threejs.org/examples/textures/moon_1024.jpg')

let g1=new THREE.BoxGeometry(2,2,2)
let m1=new THREE.MeshStandardMaterial({color:0x00ffff,metalness:.7,roughness:.2})
let q=new THREE.Mesh(g1,m1)
q.position.x=-4
s.add(q)

let g2=new THREE.SphereGeometry(1.5,32,32)
let m2=new THREE.MeshStandardMaterial({map:t})
let w=new THREE.Mesh(g2,m2)
s.add(w)

let g3=new THREE.TorusKnotGeometry(1,.3,120,20)
let m3=new THREE.MeshStandardMaterial({color:0xff00ff})
let e=new THREE.Mesh(g3,m3)
e.position.x=4
s.add(e)

let g4=new THREE.ConeGeometry(1.2,2.5,6)
let m4=new THREE.MeshStandardMaterial({color:0xffff00,wireframe:true})
let y=new THREE.Mesh(g4,m4)
y.position.set(0,-3,-2)
s.add(y)

let p=[]
for(let i=0;i<400;i++){
let g=new THREE.SphereGeometry(.04,6,6)
let m=new THREE.MeshBasicMaterial({color:0xffffff})
let z=new THREE.Mesh(g,m)
z.position.set((Math.random()-.5)*80,(Math.random()-.5)*80,(Math.random()-.5)*80)
s.add(z)
p.push(z)
}

c.position.z=10

let x=0
let v=0
let n=0
let k=0

addEventListener('mousemove',o=>{
x=(o.clientX/innerWidth-.5)*2
v=(o.clientY/innerHeight-.5)*2
})

addEventListener('resize',()=>{
c.aspect=innerWidth/innerHeight
c.updateProjectionMatrix()
r.setSize(innerWidth,innerHeight)
})

let f=0
let j=0
let u=10
let b=0

document.getElementById('a').onclick=()=>{
f=!f
}

document.getElementById('c').onclick=()=>{
b=!b
s.background=new THREE.Color(b?0x220022:0x050505)
}

document.getElementById('d').onclick=()=>{
u=u===10?5:10
}

document.getElementById('e').onclick=()=>{
j=!j
}

function a(){
requestAnimationFrame(a)

c.position.x+=((x*3)-c.position.x)*.03
c.position.y+=((-v*2)-c.position.y)*.03
c.position.z+=((u)-c.position.z)*.03
c.lookAt(0,0,0)

q.rotation.x+=.01
q.rotation.y+=.01

w.rotation.y+=.004

if(f){
e.rotation.x+=.09

e.rotation.y+=.05
}else{
e.rotation.x+=.01

e.rotation.y+=.01
}

if(j){
q.position.y=Math.sin(Date.now()*.002)*2
w.position.y=Math.cos(Date.now()*.002)*2

e.position.y=Math.sin(Date.now()*.003)*2
}

y.rotation.z+=.01

y.rotation.y+=.01

n+=.01
l.position.x=Math.sin(n)*10
l.position.z=Math.cos(n)*10

p.forEach(i=>{
i.rotation.x+=.01
})

r.render(s,c)
}
a()
</script>
</body>
</html>
