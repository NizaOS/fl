<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>fun life hub</title>
<style>
body{
margin:0;
overflow:hidden;
background:#000;
font-family:arial;
}
#u{
position:absolute;
top:20px;
left:20px;
color:#fff;
z-index:10;
width:300px;
background:rgba(255,255,255,.08);
padding:16px;
border-radius:16px;
backdrop-filter:blur(6px);
}
#u h1{
margin:0 0 10px;
font-size:28px;
}
#u p{
font-size:14px;
line-height:1.5;
}
#b{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}
button{
border:none;
padding:10px 14px;
border-radius:999px;
cursor:pointer;
font-size:12px;
}
canvas{
display:block;
}
</style>
</head>
<body>
<div id="u">
<h1>fun life hub</h1>
<p>explorre glowing worlds with giant shaps and neon stars flying arond the dark skyy.</p>
<p>this craazy place has moving objects, spin effects and cool texturs everywherre.</p>
<div id="b">
<button id="a">spin mod</button>
<button id="c">dark sky</button>
<button id="d">zoom mod</button>
<button id="e">move shaps</button>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.min.js"></script>
<script>
let s=new THREE.Scene()
let c=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,.1,1000)
let r=new THREE.WebGLRenderer({antialias:true})
r.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(r.domElement)

let a=new THREE.AmbientLight(0xffffff,.7)
s.add(a)

let l=new THREE.PointLight(0xffffff,2)
l.position.set(5,5,5)
s.add(l)

let t=new THREE.TextureLoader().load('https://threejs.org/examples/textures/brick_diffuse.jpg')

let g1=new THREE.BoxGeometry(3,3,3)
let m1=new THREE.MeshStandardMaterial({map:t})
let q=new THREE.Mesh(g1,m1)
q.position.x=-5
s.add(q)

let g2=new THREE.SphereGeometry(2,32,32)
let m2=new THREE.MeshStandardMaterial({color:0xff00ff})
let w=new THREE.Mesh(g2,m2)
s.add(w)

let g3=new THREE.TorusKnotGeometry(1.5,.5,100,16)
let m3=new THREE.MeshStandardMaterial({color:0x00ffff})
let e=new THREE.Mesh(g3,m3)
e.position.x=5
s.add(e)

let g4=new THREE.ConeGeometry(2,4,32)
let m4=new THREE.MeshStandardMaterial({color:0xffff00})
let y=new THREE.Mesh(g4,m4)
y.position.set(0,-4,0)
s.add(y)

let st=new THREE.BufferGeometry()
let ar=[]
for(let i=0;i<1000;i++){
ar.push((Math.random()-.5)*100)
ar.push((Math.random()-.5)*100)
ar.push((Math.random()-.5)*100)
}
st.setAttribute('position',new THREE.Float32BufferAttribute(ar,3))

let sm=new THREE.PointsMaterial({color:0xffffff,size:.15})
let sp=new THREE.Points(st,sm)
s.add(sp)

c.position.z=12

let f=0
let mv=0
let z=12
let bg=0

document.getElementById('a').onclick=()=>{
f=!f
}

document.getElementById('c').onclick=()=>{
bg=!bg
s.background=new THREE.Color(bg?0x220022:0x000000)
}

document.getElementById('d').onclick=()=>{
z=z===12?7:12
}

document.getElementById('e').onclick=()=>{
mv=!mv
}

window.addEventListener('resize',()=>{
c.aspect=window.innerWidth/window.innerHeight
c.updateProjectionMatrix()
r.setSize(window.innerWidth,window.innerHeight)
})

function n(){
requestAnimationFrame(n)

c.position.z+=(z-c.position.z)*.05

q.rotation.x+=.01
q.rotation.y+=.01
w.rotation.y+=.01

e.rotation.x+=f?.08:.01

e.rotation.y+=f?.08:.01

y.rotation.y+=.02
sp.rotation.y+=.001

if(mv){
q.position.y=Math.sin(Date.now()*.002)*2
w.position.y=Math.cos(Date.now()*.002)*2
e.position.y=Math.sin(Date.now()*.003)*2
}

r.render(s,c)
}

n()
</script>
</body>
</html>
